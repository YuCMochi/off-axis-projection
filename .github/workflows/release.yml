name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\Nuitka\Nuitka\Cache
          key: nuitka-${{ runner.os }}-${{ hashFiles('app.py', 'requirements.txt') }}

      - name: Build exe
        run: python -m nuitka app.py --standalone --enable-plugin=tk-inter --include-package=mediapipe --include-package=cv2 --include-package-data=mediapipe --include-package-data=cv2 --windows-console-mode=disable --output-filename=OffAxisTracker --output-dir=dist --assume-yes-for-downloads

      - name: Zip output
        run: Compress-Archive -Path dist\app.dist\* -DestinationPath OffAxisTracker.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: OffAxisTracker.zip
